[pytest]
testpaths = tests
python_files = test_*.py
addopts = -ra --strict-markers --html=artifacts/reports/pytest_report.html --self-contained-html
markers =
    ui: UI chatbot automation tests
    proof: live proof/instrumentation checks for the chatbot
    dspy: DSPy dataset and deterministic evaluation tests
    ragas: RAGAS evaluation tests
    compliance: framework compliance and audit checks
    regression: regression coverage for chatbot behavior
