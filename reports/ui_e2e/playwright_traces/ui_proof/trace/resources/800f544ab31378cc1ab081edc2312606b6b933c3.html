<body>
    
    <div b-tcrnqxutcf class="container">
        <main b-tcrnqxutcf role="main" class="pb-3">
            

<h2 class="chat-title">Chat</h2>
<div class="chat-container">
    <div id="chatHistory" class="chat-history"></div>
    <div id="loading" class="d-none align-items-center gap-2 mb-2">
        <div class="spinner-border" role="status" aria-hidden="true"></div>
        <span>Waiting ...</span>
    </div>
    <form id="chatForm" autocomplete="off">
        <div class="chat-inputbar">
            <div class="input-group">
                <input id="prompt" class="form-control" placeholder="Type a prompt..." />
                <input id="threadId" type="hidden" />
                <button id="sendBtn" type="submit" class="btn btn-primary">Send</button>
            </div>
        </div>
    </form>
</div>
<style>
    .chat-container {
        max-width: 700px;
        margin: 0 auto;
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .chat-title {
        margin: 0 0 4px;
        font-weight: 700;
        letter-spacing: 0.2px;
    }

    .chat-history {
        border: 1px solid rgba(17, 24, 39, 0.08);
        background: linear-gradient(180deg, #ffffff, #f8fafc);
        height: 360px;
        padding: 14px;
        overflow-y: scroll;
        margin-bottom: 0;
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .loading {
        display: none;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
        font-size: 1.1em;
        font-weight: 500;
        color: #444;
    }

    /* Simple CSS spinner */
    .spinner {
        width: 16px;
        height: 16px;
        border: 3px solid #ccc;
        border-top: 3px solid #007bff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }

    .chat-inputbar {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .message-row {
        display: flex;
        align-items: flex-end;
        gap: 10px;
    }

    .message-row-user {
        justify-content: flex-end;
    }

    .avatar {
        width: 30px;
        height: 30px;
        border-radius: 999px;
        background: #e5e7eb;
        color: #111827;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 12px;
        flex: 0 0 auto;
        border: 1px solid rgba(17, 24, 39, 0.08);
    }

    .avatar-user {
        background: rgba(13, 110, 253, 0.15);
        color: #0d6efd;
        border-color: rgba(13, 110, 253, 0.25);
    }

    .bubble {
        max-width: 78%;
        padding: 10px 14px;
        border-radius: 16px;
        line-height: 1.45;
        font-size: 14px;
        word-wrap: break-word;
        box-shadow: 0 1px 0 rgba(16, 24, 40, 0.04);
        border: 1px solid rgba(17, 24, 39, 0.08);
    }

    .bubble-header {
        font-size: 12px;
        font-weight: 700;
        opacity: 0.75;
        margin-bottom: 6px;
    }

    .bubble-body {
        white-space: normal;
    }

    .bubble-user {
        background: #0d6efd;
        color: white;
        border-color: #0d6efd;
        border-bottom-right-radius: 6px;
    }

    .bubble-user .bubble-body {
        white-space: pre-wrap;
    }

    .bubble-assistant {
        background: #ffffff;
        color: #111827;
        border-bottom-left-radius: 6px;
    }

    .bubble-error {
        background: #fff7ed;
        color: #9a3412;
        border-color: rgba(249, 115, 22, 0.35);
        border-bottom-left-radius: 6px;
    }

    .bubble-error .bubble-header {
        opacity: 0.9;
    }

    .bubble-assistant .bubble-body :first-child {
        margin-top: 0;
    }

    .bubble-assistant .bubble-body p {
        margin: 0.5em 0;
    }

    .bubble-assistant .bubble-body ul,
    .bubble-assistant .bubble-body ol {
        margin: 0.35em 0 0.5em 1.25em;
        padding-left: 1em;
    }

    .bubble-assistant .bubble-body li {
        margin: 0.2em 0;
    }

    .bubble-assistant .bubble-body a {
        color: #0b5ed7;
        text-decoration: underline;
        text-underline-offset: 2px;
    }

</style>

        </main>
    </div>

    <footer b-tcrnqxutcf class="border-top footer text-muted">
        <div b-tcrnqxutcf class="container">
            
        </div>
    </footer>
    <script src="/lib/jquery/dist/jquery.min.js"></script>
    <script src="/lib/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/site.js?v=hRQyftXiu1lLX2P9Ly9xa4gHJgLeR1uGN5qegUobtGo"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script>
        const form = document.getElementById("chatForm");
        const sendBtn = document.getElementById("sendBtn");
        const chatHistory = document.getElementById("chatHistory");
        const loading = document.getElementById("loading");

        /** Tighten common citation spacing from model output (e.g. "text 1 ." → "text 1.", "4 5 ." → "4,5.") */
        function normalizeCitationSpacing(text) {
            if (!text) return text;
            let t = text;
            // "**2** ." → "**2**."
            t = t.replace(/\*\*([^*]+)\*\*\s+([.!?,;:])/g, "**$1**$2");
            // Adjacent citation indices before punctuation
            t = t.replace(/(\d{1,3})\s+(\d{1,3})\s+(\d{1,3})(?=\s*[.!?,;:])/g, "$1,$2,$3");
            t = t.replace(/(\d{1,3})\s+(\d{1,3})(?=\s*[.!?,;:])/g, "$1,$2");
            t = t.replace(/(\d+)\s+([.!?,;:])/g, "$1$2");
            return t;
        }

        function removeSourceAnnotations(text) {
            if (!text) return text;
            let t = text;
            // Examples seen in output: "[9:2†source]" or ""
            // Remove the whole bracket token (with or without the dagger).
            t = t.replace(/[\[\u3010]\s*\d+\s*:\s*\d+\s*\u2020\s*source\s*[\]\u3011]/g, "");
            t = t.replace(/[\[\u3010]\s*\d+\s*:\s*\d+\s*source\s*[\]\u3011]/g, "");
            // Remove leftover whitespace before punctuation introduced by stripping tokens
            t = t.replace(/\s+([.!?,;:])/g, "$1");
            return t;
        }

        function renderAssistantMarkdown(raw) {
            const withoutSources = removeSourceAnnotations(raw);
            const normalized = normalizeCitationSpacing(withoutSources);
            marked.setOptions({ gfm: true, breaks: true });
            const html = marked.parse(normalized);
            return DOMPurify.sanitize(html, {
                USE_PROFILES: { html: true }
            });
        }

        form.addEventListener("submit", async function (e) {
            e.preventDefault();
            await sendMessageAsync();
        });

        async function sendMessageAsync() {
            const message = document.getElementById("prompt").value.trim();
            const threadId = document.getElementById("threadId").value.trim();
            if (!message) return;

            appendChat("user", message);
            document.getElementById("prompt").value = "";
            sendBtn.disabled = true;
            loading.classList.remove("d-none");

            try {
                const response = await fetch("/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: message, threadId: threadId })
                });

                if (!response.ok) {
                    appendChat("Error", "Failed to call API");
                    return;
                }

                const data = await response.json();
                console.log(data);
                console.log(response);
                appendChat("agent", data.result.message);
                document.getElementById("threadId").value=data.result.threadId;
            }
            catch (err) {
                appendChat("Error", err.message);
            }
            finally {
                sendBtn.disabled = false;
                loading.classList.add("d-none");
            }
        }

        function appendChat(sender, message) {
            const isUser = sender === "user";
            const isError = sender === "Error";

            const senderLabel = isUser ? "You" : (isError ? "Error" : "Agent");
            const avatarLabel = isUser ? "Y" : (isError ? "!" : "AI");

            const row = document.createElement("div");
            row.classList.add("message-row");
            if (isUser) row.classList.add("message-row-user");

            const avatar = document.createElement("div");
            avatar.classList.add("avatar");
            if (isUser) avatar.classList.add("avatar-user");
            row.appendChild(avatar);
            avatar.textContent = avatarLabel;

            const bubble = document.createElement("div");
            bubble.classList.add("bubble");
            if (isUser) bubble.classList.add("bubble-user");
            else if (isError) bubble.classList.add("bubble-error");
            else bubble.classList.add("bubble-assistant");

            const header = document.createElement("div");
            header.classList.add("bubble-header");
            header.textContent = senderLabel;
            bubble.appendChild(header);

            const body = document.createElement("div");
            body.classList.add("bubble-body");
            if (isUser || isError) {
                body.textContent = message;
            } else {
                body.innerHTML = renderAssistantMarkdown(message);
            }
            bubble.appendChild(body);

            row.appendChild(bubble);
            chatHistory.appendChild(row);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }
    </script>


</body>
</html>
