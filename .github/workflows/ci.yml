name: chatbot-rag-eval-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      HEADLESS: "true"
      TIMEOUT_MS: "30000"
      RESPONSE_STABLE_MS: "1200"
      PDF_REGISTRY_PATH: data/pdf_registry.json
      CHAT_WIDGET_BUTTON_SELECTOR: ${{ secrets.CHAT_WIDGET_BUTTON_SELECTOR }}
      CHAT_INPUT_SELECTOR: ${{ secrets.CHAT_INPUT_SELECTOR }}
      CHAT_SEND_BUTTON_SELECTOR: ${{ secrets.CHAT_SEND_BUTTON_SELECTOR }}
      BOT_MESSAGE_SELECTOR: ${{ secrets.BOT_MESSAGE_SELECTOR }}
      CHAT_STREAMING_INDICATOR_SELECTOR: ${{ secrets.CHAT_STREAMING_INDICATOR_SELECTOR }}
      CHAT_CITATION_SELECTOR: ${{ secrets.CHAT_CITATION_SELECTOR }}
      NETWORK_CONTEXT_URL_KEYWORD: ${{ secrets.NETWORK_CONTEXT_URL_KEYWORD }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-4o-mini

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run compliance audit
        run: pytest -m compliance -q

      - name: Run UI capture
        run: pytest -m ui -q

      - name: Run DSPy evaluation
        run: pytest -m dspy -q

      - name: Run RAGAS evaluation
        run: pytest -m ragas -q

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chatbot-rag-eval-artifacts
          path: artifacts/
